<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>국어 영역 - 디지털 시험지</title>
<style>
  :root {
    --paper: #fdfcf9;
    --ink: #1a1a1a;
    --ink-soft: #4a4a48;
    --rule: #1a1a1a;
    --rule-light: #c9c5bb;
    --accent: #8b2c2c;
    --correct: #2d6a4f;
    --correct-bg: #e8f3ed;
    --wrong: #8b2c2c;
    --wrong-bg: #faeded;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #e8e6e0;
    font-family: "Noto Serif KR", "Batang", serif;
    color: var(--ink);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── 상단 바 ── */
  .topbar {
    flex-shrink: 0;
    background: var(--ink);
    color: #fdfcf9;
    padding: 9px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: "Noto Sans KR", sans-serif;
    font-size: 13px;
    z-index: 10;
  }
  .topbar .title { font-weight: 600; }
  .topbar .progress { color: #cfcabe; }

  /* ── 메인 영역 (지문 고정 + 문항 스크롤) ── */
  .main-area {
    flex: 1;
    display: flex;
    overflow: hidden;
    gap: 0;
  }

  /* 지문 패널 */
  .passage-panel {
    width: 50%;
    background: var(--paper);
    border-right: 2px solid var(--rule-light);
    overflow-y: auto;
    padding: 28px 28px 40px;
    flex-shrink: 0;
  }
  .passage-panel::-webkit-scrollbar { width: 6px; }
  .passage-panel::-webkit-scrollbar-thumb { background: var(--rule-light); border-radius: 3px; }

  .passage-range {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--ink-soft);
  }
  .passage-source {
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 14px;
    font-family: "Noto Sans KR", sans-serif;
  }
  .passage-text {
    font-size: 15px;
    line-height: 2.0;
    text-align: justify;
    word-break: keep-all;
  }
  .passage-text p { margin-bottom: 0.6em; }

  /* 문항 패널 */
  .question-panel {
    width: 50%;
    background: #f6f4ee;
    overflow-y: auto;
    padding: 28px 28px 100px;
  }
  .question-panel::-webkit-scrollbar { width: 6px; }
  .question-panel::-webkit-scrollbar-thumb { background: var(--rule-light); border-radius: 3px; }

  /* 문항 번호 / 지시문 */
  .q-number {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .q-points {
    font-size: 12px;
    color: var(--ink-soft);
    font-family: "Noto Sans KR", sans-serif;
    font-weight: 400;
  }
  .result-badge { display: none; } /* SVG 마크로 대체 */

  /* 채점 마크 공통 */
  .mark-wrap {
    position: relative;
    display: inline-flex;
    align-items: center;
    margin-left: 6px;
    vertical-align: middle;
  }
  /* 선지 번호 위 체크 오버레이 */
  .num-btn-wrap {
    position: relative;
    flex-shrink: 0;
    width: 26px;
    height: 26px;
    margin-top: 1px;
  }
  .num-btn-wrap .num-btn {
    position: absolute;
    inset: 0;
    margin: 0;
  }
  .num-btn-wrap .check-mark {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .q-stem {
    font-size: 15px;
    line-height: 1.85;
    margin-bottom: 14px;
    word-break: keep-all;
  }

  /* 보기 박스 */
  .box-example {
    border: 1px solid var(--rule);
    padding: 14px 16px;
    margin-bottom: 16px;
    font-size: 14.5px;
    line-height: 1.85;
    background: #fbfaf6;
    word-break: keep-all;
  }
  .box-label {
    text-align: center;
    font-weight: 700;
    font-size: 13px;
    margin-bottom: 8px;
    letter-spacing: 0.2em;
  }

  /* 선택지 */
  .choices { display: flex; flex-direction: column; gap: 4px; margin-top: 4px; }
  .choice-row { display: flex; flex-direction: column; }

  .choice {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 12px;
    margin-bottom: 2px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14.5px;
    line-height: 1.65;
    word-break: keep-all;
    transition: background 0.12s, border-color 0.12s;
    border: 1.5px solid transparent;
    -webkit-tap-highlight-color: transparent;
    background: var(--paper);
  }
  .choice:hover { background: #eceae3; }
  .choice.selected {
    background: #eceae3;
    border-color: var(--ink);
  }
  .num-btn {
    flex-shrink: 0;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1.5px solid var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-family: "Noto Sans KR", sans-serif;
    font-weight: 600;
    background: var(--paper);
    margin-top: 1px;
  }
  .choice.selected .num-btn { background: var(--ink); color: var(--paper); }
  .choice-text { flex: 1; padding-top: 2px; }

  /* 채점 후 선택지 스타일 */
  .graded-mode .choice { cursor: pointer; }
  .graded-mode .choice.is-answer { background: var(--correct-bg); border-color: var(--correct); }
  .graded-mode .choice.is-answer .num-btn { background: var(--correct); border-color: var(--correct); color: #fff; }
  .graded-mode .choice.is-wrong-pick { background: var(--wrong-bg); border-color: var(--wrong); }
  .graded-mode .choice.is-wrong-pick .num-btn { background: var(--wrong); border-color: var(--wrong); color: #fff; }
  .graded-mode .choice:not(.is-answer):not(.is-wrong-pick):hover { background: #f1efe8; }

  /* 해설 */
  .hint-text {
    display: none;
    font-family: "Noto Sans KR", sans-serif;
    font-size: 12px;
    color: #8a877d;
    margin: 6px 0 4px;
  }
  .graded-mode .hint-text { display: block; }

  .explanation {
    display: none;
    margin: 4px 0 6px 0;
    padding: 12px 14px;
    background: #f0ede6;
    border-left: 3px solid var(--ink);
    font-family: "Noto Sans KR", sans-serif;
    font-size: 13px;
    line-height: 1.8;
    color: #2b2b2a;
    word-break: keep-all;
    white-space: pre-line;
  }
  .explanation.is-open { display: block; }
  .exp-label {
    font-weight: 700;
    font-size: 12px;
    color: var(--accent);
    display: block;
    margin-bottom: 5px;
    letter-spacing: 0.05em;
  }
  .intro-explanation {
    margin-bottom: 12px;
    border-left-color: var(--accent);
  }

  /* checked-by-student 표시 */
  .graded-mode .choice.checked-by-student .choice-text::after {
    content: " ✓";
    font-size: 11px;
    color: #8a877d;
    font-family: "Noto Sans KR", sans-serif;
  }

  /* ── 하단 네비게이션 바 ── */
  .nav-bar {
    flex-shrink: 0;
    background: var(--ink);
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    font-family: "Noto Sans KR", sans-serif;
    z-index: 10;
  }
  .nav-right  { display: flex; gap: 8px; align-items: center; }

  .btn {
    padding: 10px 22px;
    border-radius: 6px;
    border: none;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    font-family: "Noto Sans KR", sans-serif;
    white-space: nowrap;
  }
  .btn-prev, .btn-next {
    background: transparent;
    color: #cfcabe;
    border: 1px solid #57544c;
  }
  .btn-prev:hover, .btn-next:hover { color: #fff; border-color: #cfcabe; }
  .btn-submit { background: var(--accent); color: #fff; }
  .btn-submit:hover { background: #732424; }
  .btn-submit:disabled { background: #57544c; cursor: default; }
  .btn-download { background: #2d6a4f; color: #fff; display: none; }
  .btn-download:hover { background: #245740; }

  .q-indicator {
    font-size: 13px;
    color: #cfcabe;
    min-width: 60px;
    text-align: center;
  }

  /* ── 모바일: 세로 분할 ── */
  @media (max-width: 700px) {
    body { overflow: auto; height: auto; }
    .main-area { flex-direction: column; overflow: visible; height: auto; }
    .passage-panel, .question-panel {
      width: 100%;
      overflow-y: visible;
      border-right: none;
      border-bottom: 2px solid var(--rule-light);
    }
    .nav-bar { position: sticky; bottom: 0; }
  }

  /* bracket-A */
  .bracket-A { text-decoration: underline; text-decoration-thickness: 1px; }
  .bracket-label { font-weight: 700; font-size: 13px; margin-left: 2px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="title">2026학년도 5월 고3 전국연합학력평가 · 국어</div>
  <div class="progress" id="progressText">0 / 0 문항 풀이</div>
</div>

<div class="main-area">
  <div class="passage-panel" id="passagePanel">
    <!-- 지문이 여기 고정 표시 -->
  </div>
  <div class="question-panel" id="questionPanel">
    <!-- 현재 문항 1개만 표시 -->
  </div>
</div>

<div class="nav-bar">
  <span class="q-indicator" id="qIndicator">1 / 1</span>
  <div class="nav-right">
    <button class="btn btn-prev" id="prevBtn" onclick="movePrev()">◀ 이전</button>
    <button class="btn btn-next" id="nextBtn" onclick="moveNext()">다음 ▶</button>
    <button class="btn btn-submit" id="submitBtn">제출하고 채점하기</button>
    <button class="btn btn-download" id="downloadBtn">결과 파일 다운로드</button>
  </div>
</div>

<script>

/* 이 시험지의 이름 (Notion "시험명" 칸에 기록됨) */

const passages = [
  {
    id: "P1",
    range: "1 ~ 3",
    source: "[독서이론] <출전> 로이스 타이슨, 「비평이론의 모든 것」",
    text: `
<p>글을 읽을 때 글에 사용된 개념 간의 관계를 분석하는 것은 글에 담긴 개별적 내용뿐만 아니라 글 전체의 논리적 구조를 함께 파악하는 데 도움이 된다. 이항 대립 구조는 두 가지 개념을 짝지어 상반되는 성격으로 대립시키는 것으로, 글의 구조를 완성하고 주제를 강조하기 위해 사용된다. 독자가 글을 읽을 때 어휘나 문장과 같은 글의 개별 요소의 의미를 분석하여 저자가 설정한 이항 대립 구조를 파악하면, 글의 구조를 파악할 수 있을 뿐만 아니라 이항 대립 구조를 단서로 저자의 의도를 추론할 수도 있다.</p>
<p>이렇게 이항 대립 구조를 분석함으로써 저자의 의도를 추론할 수 있다는 것을 전제로, 저자의 의도에서 벗어나 글의 의미를 확장하는 읽기 방법이 해체적 읽기이다. 해체적 읽기에서는 이항 대립되는 개념들 사이에 저자가 어느 쪽의 개념을 강조하느냐에 따라 위계가 필연적으로 형성된다고 보고, 이 위계의 모순을 밝힌다. 해체적 읽기는 글을 다음과 같은 세 단계로 나누어 분석한다. 첫 번째 단계는 이항 대립 구조를 확인하는 것으로 독자는 글에서 대립되어 있는 두 가지 개념의 짝을 찾아야 한다. 글 안에 흩어져 있는 어휘나 문장과 같은 글의 개별 요소를 두 개의 대립군으로 분류함으로써, 그 대립 관계가 글의 구조를 관통하는 핵심적인 이항 대립 구조임을 식별해 내는 것이다. 두 번째 단계는 이항 대립 구조 속의 위계를 파악하는 것이다. 이를 위해 독자는 글에서 어휘나 문장 등이 쓰인 맥락을 분석하여 저자가 긍정적으로 여기는 개념과 부정적으로 여기는 개념 사이의 위계를 확인해야 한다. 마지막 단계는 앞서 파악한 위계의 모순을 밝히는 것이다. 독자는 글에 부정적으로 나타난 개념에 새로운 가치를 부여함으로써 저자가 설정한 위계가 절대적이지 않음을 파악할 수 있다. 혹은 글에서 저자가 말하고자 한 바와 실제로 글이 의미하고 있는 바가 어긋나는 지점을 포착하여 위계의 모순을 파악할 수 있다. 이를 통해 글의 의미가 하나로 정해지지 않으며 글은 다양한 관점에서 해석될 수 있음을 알 수 있다.</p>
<p>독자는 해체적 읽기를 통해, 글의 의미가 고정된 것이 아니라 다양하게 변할 수 있음을 파악한다. <span class="bracket-A">이를 바탕으로 독자가 저자의 의도대로 해석한 내용이 언제나 객관적이고 타당한 것은 아니며, 관점에 따라 다양한 해석이 존재함을 알 수 있다.<span class="bracket-label">[A]</span></span> 또한 독자는 글을 저자에 의해 완성된 결과물이 아니라 의미가 확장되는 공간으로 받아들여, 글을 재구성함으로써 새로운 의미를 만들어 내는 능동적인 독자로 거듭나게 된다.</p>
    `
  }
,
  {
    id: "P2",
    range: "10 ~ 13",
    source: "[과학] <출전> 유진 헥트, 「광학」",
    text: `
<p>카메라 등의 광학 기기에 쓰이는 볼록 렌즈는, 물체에서 반사되어 렌즈로 입사한 광선들을 수렴시킨다. 물체 표면의 한 점인 물체점에서 렌즈로 입사한 여러 광선이 굴절하여 수렴하는 점을 상점이라고 한다. 렌즈로 입사한 모든 광선이 하나의 상점에 수렴한다면 상은 뚜렷한 점의 형태로 맺히지만, 하나의 상점에 수렴하지 않으면 상이 흐려지거나 일그러져 보이는 수차 현상이 <u>ⓐ 발생한다</u>. 특히 물체점이 광축에서 멀리 떨어지면 렌즈에서 굴절된 광선들은 서로 다른 두 상점에 수렴하게 되어 흐릿한 상을 맺는 경우가 있는데, 이러한 현상은 비점 수차에 <u>ⓑ 해당한다</u>.</p>
<p>광축은 렌즈의 중심을 지나면서 렌즈 면에 수직인 가상의 직선이다. 물체점이 광축 위에 있고, 렌즈가 회전 일치성을 지니며, 광선들이 하나의 상점에 수렴할 경우 뚜렷한 상이 맺힌다. 이때 회전 대칭성이란 광축을 중심으로 회전시켜도 항상 원래의 형태와 겹쳐지는 성질이다. 물체점으로부터 렌즈로 입사한 광선들의 집합인 광선 다발은 물체점을 꼭짓점으로 하는 원뿔 형상을 띤다. 렌즈 중심으로 <u>ⓒ 향하는</u> 광선인 주광선은 광선 다발을 대표하는데, 주광선은 광축을 따라 렌즈 중심으로 입사하고 광선 다발의 형상은 광축을 중심으로 회전 대칭성을 지니게 된다. 이에 따라 주광선을 포함하는 평면들로 광선 다발을 나누었을 때, 광선들의 입사 양상이 어떤 평면에서든 동일해져, 전체 광선 다발은 광축 위에 있는 하나의 상점에 수렴하게 된다.</p>
<p>반면 물체점이 광축에서 멀리 벗어나면 주광선은 광축을 따라 입사하지 않게 되며, 광선 다발의 형상은 광축을 기준으로 회전 대칭성을 보이지 않게 되어 비점 수차가 발생한다. 이때 광선 다발의 수렴 양상을 살필 수 있게 하는 평면이 자오면과 구결면이다. 자오면은 광축과 주광선을 포함하는 단 하나의 평면이며, 광축을 중심으로 물체점이 어느 방향에 있는지를 드러낸다. 구결면은 자오면과 수직인 평면으로, 광축을 포함하지 않으며 주광선을 포함하는 평면이다. 자오면 위에 있는 광선들인 자오 광선과 구결면 위에 있는 광선들인 구결 광선은 입사 양상이 서로 다르며, 이에 따라 굴절 양상도 다르다. 이 때문에 광선들이 서로 다른 위치에 수렴하게 되는데, 자오 광선이 수렴하는 점을 자오 상점, 구결 광선이 수렴하는 점을 구결 상점이라고 한다. 이때 자오 상점이 구결 상점보다 렌즈의 중심까지의 거리가 더 가깝다.</p>
<p>자오 상점과 구결 상점 사이의 거리인 비점 격차가 커질수록 비점 수차는 심해진다. 비점 격차는 물체점에서 광축까지의 거리의 제곱, 즉 물체점에서 광축까지 수직으로 그은 선의 길이의 제곱에 비례한다. 자오 상점부터 구결 상점까지의 임의의 지점에서 맺히는 상의 형상은, 같은 지점에서 광선 다발을 광축에 수직인 면으로 잘랐을 때 그 단면의 형상과 <u>ⓓ 동일하다</u>. 자오 상점에서 맺히는 상을 일차상이라고 하고, 구결 상점에서 맺히는 상을 이차상이라고 한다. 일차상과 이차상은 모두 선분의 형상인데, 일차상은 구결면 위에 놓여 주광선과 수직 관계를 이루고, 이차상은 자오면 위에 놓여 주광선과 수직 관계를 이룬다. <u>ⓔ 이때 일차상과 이차상은 서로 수직이다</u>. 비점 격차가 커질수록 일차상의 길이와 이차상의 길이는 길어진다. 일차상과 이차상 사이에 맺히는 상의 대부분은 타원의 형상을 띠지만, 중간 부근에 원형을 띠는 유일한 지점이 있는데 이 지점에서의 상을 최소 착란원이라고 한다. 최소 착란원은 광선들이 하나의 상점에 수렴할 때 형성되는 상과 형태가 가장 <u>ⓔ 유사하며</u>, 일차상과 이차상 사이에 맺히는 상 중 가장 뚜렷하다. 비점 격차가 클수록 최소 착란원은 크기가 커지면서 흐려진다.</p>

    text: `
<p>오늘날 하나의 건물 안에 여러 세대와 점포 등이 공존하는 집합건물이 보편화되었다. 민법의 개별 소유와 공동 소유의 내용에 대한 규정만으로는, 하나의 건물 안에서 개별적으로 소유하는 공간과 공동으로 소유하는 공간이 공존하면서 발생하는 문제를 조정하는 데 한계가 있었다. 집합건물법이 제정되면서 <u>구분소유권</u>이라는 권리를 통해 집합건물 내의 다양한 권리관계를 명료하게 하여 공동생활을 합리적으로 규율할 수 있게 되었다.</p>
<p>구분소유권은 전유부분을 개별 소유의 대상으로 삼는 소유권을 의미하는데, 전유부분은 건물 내에서 구조상 독립성과 이용상 독립성을 모두 갖춘 부분이고 전유부분 이외의 건물 부분은 공용부분이라고 한다. 이때 구조상 독립성이란 각 건물 부분이, 바닥이나 천장, 벽, 출입문과 같이 건물을 구성하고 있지만 쉽게 이동되거나 제거될 수 없는 부분에 의해, 공용부분이나 다른 구분소유자들의 전유부분과 차단된 것을 말한다. 이용상 독립성이란 해당 부분이 다른 전유부분을 통하지 않고도 공용부분이나 외부로 출입할 수 있어, 독립된 세대, 점포 등으로 사용될 수 있어야 함을 의미한다. 구분소유권이 성립하기 위해서는 구분 행위가 필요하다. 구분 행위란, 건물을 분양하는 사람이 건물의 특정 부분을 구분하여 별개의 소유 대상으로 삼으려는 의사를 객관적으로 외부에 표시하는 것을 의미한다. 구분 행위는 분양 계약, 건축물대장 기재, 등기 등 다양한 방식이 가능하며, 전유부분에 대한 구분 행위가 있으면 그 건물에 대해 구분소유권이 성립한다.</p>
<p>공용부분에는 복도, 옥상, 공동 현관 등의 건물 부분과, 엘리베이터와 같은 건물의 부속물이 있다. 공용부분은 구분소유자들이 공유한다. 구분소유자가 전유부분을 소유함으로써 자동으로 얻게 되는 권리가 바로 공용부분에 대한 지분이다. 공용부분의 지분은 해당 구분소유자의 전유부분의 면적이 전체 전유부분의 면적에서 차지하는 비율로 결정되며, 공용부분으로 인한 수익과 비용 역시 공용부분의 지분 비율에 따른다. 전유부분이 될 수 있는 공간도 규약을 통해 공용부분으로 지정하여 노인정, 공동 휴게 공간 등으로 사용하는 것도 가능하다. 단, 이때는 공용부분이라는 것을 반드시 등기해야 한다.</p>

<p>공용부분의 관리에 대한 의사결정은 원칙적으로 구분소유자들의 결의를 중심으로 이루어진다. 공용부분의 형태나 기능 등을 변화시키는 경우도 이에 해당한다. 다만 안전 등을 사유로 긴급한 조치가 필요한 경우에는 구분소유자 개인이 단독으로 훼손된 공용부분을 복구하는 보존행위를 할 수도 있다. 이런 경우에는 관리단에 그 비용을 청구할 수 있다. 전유부분에 하자가 생긴 경우라도, 하자의 원인이 불분명할 때에는 공용부분의 하자로 여기고 구분소유자의 공동책임으로 보아 관리단에 수리 비용을 청구할 수 있다. 하자가 생긴 원인이 전유부분에 있다는 것이 명확히 밝혀지기 전까지는 누수, 난방 불량 등의 원인을 건물 전체의 구조나 공용 설비 문제로 간주하는 것이다.</p>
<p>구분소유자들의 의사결정은 관리단 집회를 통해 이루어진다. 관리단은 건물에 대하여 구분소유권이 성립되면 구분소유자 전원을 구성원으로 하여 별다른 절차가 없어도 설립된다. 관리단은 집합건물의 공동 관리를 위한 최종 의사결정의 주체이다. 관리단에서 각 구분소유자의 의결권은 규약에 특별한 규정이 없는 한, 전유부분의 면적 비율에 따라 결정된다. 구분소유자 전원은 구분소유자의 지위를 가지는 동안은 본인의 <span class="bracket-A">의사와 관계없이 법률의 규정에 의하여 구성원이 된다. 관리단에서 적법하게 결의된 사항은 그 결의에 반대한 구분소유자에 대해서도 효력을 미칠 수 있다. 구분소유자가 10인 이상일 때는 관리인을 선임해야 한다. 관리인은 구분소유자일 필요가 없으며, 관리단을 대표해 관리단의 결의 결과를 집행하는 법적 지위를 갖는다.<span class="bracket-label">[A]</span></span></p>

      `P₂에서 광축까지의 거리는 P₀의 두 배이므로 비점 격차는 거리의 제곱에 비례하여 4배가 된다. 따라서 C에서 D까지의 거리(비점 격차)도 4배가 되므로 적절하다.`,
      `(정답) C는 이차상이다. 4문단에서 비점 격차가 커질수록 일차상(D)과 이차상(C)의 길이는 길어진다고 하였다. C의 길이가 길어졌다면 비점 격차가 커진 것이므로, P₃에서 광축까지의 거리가 P₀보다 멀어야 한다. 따라서 P₀에서 광축까지의 거리가 P₃에서 광축까지의 거리보다 길다는 것은 적절하지 않다.`,

const userAnswers  = {};
const checkLog     = {};
let graded         = false;
let submittedAt    = null;
let startTime      = Date.now();
let currentIdx     = 0;  // 현재 보고 있는 문항 인덱스

// 지문별 시작 시간 추적
const passageTimes = {};   // { passageId: 시작 timestamp }
const passageElapsed = {}; // { passageId: 누적 ms }
let lastPassageId  = null;

function initPassageTimes() {
  const firstQ = questions[0];
  if (firstQ && firstQ.passageId) {
    lastPassageId = firstQ.passageId;
    passageTimes[firstQ.passageId] = Date.now();
  }
}

function switchPassageTimer(newPassageId) {
  if (lastPassageId && lastPassageId !== newPassageId) {
    // 이전 지문 시간 누적
    const elapsed = Date.now() - (passageTimes[lastPassageId] || Date.now());
    passageElapsed[lastPassageId] = (passageElapsed[lastPassageId] || 0) + elapsed;
    // 새 지문 시작
    passageTimes[newPassageId] = Date.now();
    lastPassageId = newPassageId;
  }
}

/* ─── 렌더링 ─── */

function renderPassage(passageId) {
  const panel = document.getElementById('passagePanel');
  if (!passageId) {
    panel.innerHTML = '';
    return;
  }
  const p = passages.find(x => x.id === passageId);
  if (!p) { panel.innerHTML = ''; return; }
  panel.innerHTML = `
    <div class="passage-range">[${p.range}]</div>
    <div class="passage-source">${p.source}</div>
    <div class="passage-text">${p.text}</div>
  `;
  panel.scrollTop = 0;
}

function renderQuestion(idx) {
  const q = questions[idx];
  if (!q) return;

  // 지문 전환 감지
  if (q.passageId && q.passageId !== lastPassageId) {
    switchPassageTimer(q.passageId);
  }
  renderPassage(q.passageId);

  const panel = document.getElementById('questionPanel');
  panel.innerHTML = buildQuestionHTML(q);

  // 채점 모드 클래스
  if (graded) {
    panel.classList.add('graded-mode');
    applyGradeStyle(q, panel);
  } else {
    panel.classList.remove('graded-mode');
  }

  attachChoiceHandlers(q);
  updateNav();
  panel.scrollTop = 0;
}

function buildQuestionHTML(q) {
  const isGraded = graded;
  const userAns  = userAnswers[q.id];

  // 선지별 해설
  // ── 채점 마크 SVG ──
  // 맞힌 문항: 문항번호를 감싸는 빨간 타원 ○
  const SVG_CIRCLE = `<span style="position:relative;display:inline-block;vertical-align:middle;margin-left:-2px;">
    <svg viewBox="0 0 54 54" width="54" height="54" fill="none" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;">
      <ellipse cx="27" cy="27" rx="22" ry="20"
        stroke="#c0392b" stroke-width="3.5" stroke-linecap="round"
        style="transform-origin:27px 27px;transform:rotate(-8deg) scaleX(1.1) scaleY(0.95)"/>
    </svg>
  </span>`;

  // 틀린 문항: 문항번호 위에 큰 X
  const SVG_X = `<span style="position:relative;display:inline-block;vertical-align:middle;margin-left:-2px;">
    <svg viewBox="0 0 54 54" width="54" height="54" fill="none" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;">
      <line x1="10" y1="10" x2="44" y2="44" stroke="#c0392b" stroke-width="5" stroke-linecap="round"/>
      <line x1="44" y1="10" x2="10" y2="44" stroke="#c0392b" stroke-width="5" stroke-linecap="round"/>
    </svg>
  </span>`;

  // 정답 선지 왼쪽 체크(✓)
  const SVG_CHECK_LEFT = `<svg viewBox="0 0 24 24" width="22" height="22" fill="none" style="flex-shrink:0;margin-right:4px;margin-top:3px;">
    <polyline points="3,13 9,19 21,7" stroke="#c0392b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;

  // 문항 번호 옆 마크 (번호를 감싸는 위치로)
  const qNumMark = isGraded
    ? (userAns === String(q.answer) ? SVG_CIRCLE : SVG_X)
    : '';

  const choiceRows = q.choices.map((text, idx) => {
    const num     = idx + 1;
    const circled = ["①","②","③","④","⑤"][idx];
    const expText = q.explanations ? (q.explanations[idx] || '') : '';
    const isAnswer = isGraded && num === q.answer;

    let choiceCls = 'choice';
    if (!isGraded && userAns === String(num)) choiceCls += ' selected';

    // 정답 선지: 체크를 num-btn 왼쪽에 삽입
    const numBtnHtml = isAnswer
      ? `${SVG_CHECK_LEFT}<div class="num-btn">${circled}</div>`
      : `<div class="num-btn">${circled}</div>`;

    return `
      <div class="choice-row">
        <div class="${choiceCls}" data-qid="${q.id}" data-num="${num}">
          ${numBtnHtml}
          <div class="choice-text">${text}</div>
        </div>
        ${expText ? `<div class="explanation" id="exp-${q.id}-${num}">
          <span class="exp-label">${circled} 해설</span>${expText}
        </div>` : ''}
      </div>`;
  }).join('');

  const boxHtml  = q.boxExample ? `
    <div class="box-example">
      <div class="box-label">보 기</div>
      ${q.boxExample}
    </div>` : '';

  const introHtml = ''; // 해설 개요 자동 표시 없음
  const hintHtml  = `<div class="hint-text">선택지를 누르면 그 선지 해설이 펼쳐집니다.</div>`;

  return `
    <div class="q-number" style="position:relative;display:inline-flex;align-items:center;">${q.id}.${qNumMark} <span class="q-points" style="margin-left:6px;">[${q.points}점]</span></div>
    <div class="q-stem">${q.stem}</div>
    ${boxHtml}
    ${introHtml}
    ${hintHtml}
    <div class="choices">${choiceRows}</div>
  `;
}

function applyGradeStyle(q, panel) {
  const userAns = userAnswers[q.id];
  panel.querySelectorAll('.choice').forEach(el => {
    const num = el.dataset.num;
    if (num === String(q.answer)) el.classList.add('is-answer');
    if (userAns && num === String(userAns) && num !== String(q.answer)) {
      el.classList.add('is-wrong-pick');
    }
    if (checkLog[q.id] && checkLog[q.id].has(num)) {
      el.classList.add('checked-by-student');
    }
  });
}

function attachChoiceHandlers(q) {
  document.querySelectorAll('.choice').forEach(el => {
    el.addEventListener('click', () => {
      if (!graded) {
        // 풀이 단계: 답 선택
        const qid = el.dataset.qid;
        const num = el.dataset.num;
        userAnswers[qid] = num;
        document.querySelectorAll(`.choice[data-qid="${qid}"]`).forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        updateProgress();
      } else {
        // 채점 후: 해설 토글 + 로그
        const qid = el.dataset.qid;
        const num = el.dataset.num;
        const expEl = document.getElementById(`exp-${qid}-${num}`);
        if (expEl) expEl.classList.toggle('is-open');
        el.classList.add('checked-by-student');
        if (!checkLog[qid]) checkLog[qid] = new Set();
        checkLog[qid].add(num);
      }
    });
  });
}

/* ─── 네비게이션 ─── */

function movePrev() {
  if (currentIdx > 0) {
    const nextQ = questions[currentIdx - 1];
    const curQ  = questions[currentIdx];
    if (!graded && nextQ.passageId !== curQ.passageId) {
      const p = passages.find(x => x.id === nextQ.passageId);
      const rangeText = p ? `[${p.range}]` : '';
      if (!confirm(`이전 지문 ${rangeText}으로 이동합니다.\n확인을 누르면 이전 지문으로 돌아갑니다.`)) return;
    }
    currentIdx--;
    renderQuestion(currentIdx);
  }
}

function moveNext() {
  if (currentIdx < questions.length - 1) {
    const nextQ = questions[currentIdx + 1];
    const curQ  = questions[currentIdx];
    if (!graded && nextQ.passageId !== curQ.passageId) {
      const p = passages.find(x => x.id === nextQ.passageId);
      const rangeText = p ? `[${p.range}]` : '';
      if (!confirm(`다음 지문 ${rangeText}으로 넘어갑니다.\n확인을 누르면 새 지문이 시작됩니다.`)) return;
    }
    currentIdx++;
    renderQuestion(currentIdx);
  }
}

function updateNav() {
  const total    = questions.length;
  const isFirst  = currentIdx === 0;
  const isLast   = currentIdx === total - 1;

  document.getElementById('qIndicator').textContent = `${currentIdx + 1} / ${total}`;

  const prevBtn   = document.getElementById('prevBtn');
  const nextBtn   = document.getElementById('nextBtn');
  const submitBtn = document.getElementById('submitBtn');

  if (graded) {
    // 채점 후: 이전/다음만 (제출 이미 숨겨짐)
    prevBtn.style.display   = isFirst ? 'none' : 'inline-block';
    nextBtn.style.display   = isLast  ? 'none' : 'inline-block';
    submitBtn.style.display = 'none';
  } else if (isFirst && !isLast) {
    // 첫 문항: 다음만
    prevBtn.style.display   = 'none';
    nextBtn.style.display   = 'inline-block';
    submitBtn.style.display = 'none';
  } else if (isLast) {
    // 마지막 문항: 이전 + 제출
    prevBtn.style.display   = isFirst ? 'none' : 'inline-block';
    nextBtn.style.display   = 'none';
    submitBtn.style.display = 'inline-block';
  } else {
    // 중간 문항: 이전 + 다음
    prevBtn.style.display   = 'inline-block';
    nextBtn.style.display   = 'inline-block';
    submitBtn.style.display = 'none';
  }

  updateProgress();
}

function updateProgress() {
  const answered = Object.keys(userAnswers).length;
  document.getElementById('progressText').textContent =
    `${answered} / ${questions.length} 문항 풀이`;
}

/* ─── 제출 ─── */

document.getElementById('submitBtn').addEventListener('click', () => {
  const unanswered = questions.filter(q => !userAnswers[q.id]);
  if (unanswered.length > 0) {
    const ok = confirm(`${unanswered.length}개 문항이 아직 풀리지 않았습니다. 그래도 제출할까요?`);
    if (!ok) return;
  }

  graded      = true;
  submittedAt = new Date();

  // 마지막 지문 시간 마감
  if (lastPassageId) {
    const elapsed = Date.now() - (passageTimes[lastPassageId] || Date.now());
    passageElapsed[lastPassageId] = (passageElapsed[lastPassageId] || 0) + elapsed;
  }

  // 점수 계산
  let correct = 0, total = 0, earned = 0;
  questions.forEach(q => {
    total += q.points;
    if (userAnswers[q.id] === String(q.answer)) { correct++; earned += q.points; }
  });

  alert(`채점 결과\n\n맞은 문항: ${correct} / ${questions.length}\n획득 점수: ${earned} / ${total}점\n\n확인을 누르면 1번 문항부터 답안을 확인할 수 있습니다.`);

  document.getElementById('submitBtn').style.display  = 'none';
  document.getElementById('downloadBtn').style.display = 'inline-block';

  // 상단 바를 답안 확인 모드로 전환
  const topbar = document.querySelector('.topbar');
  topbar.style.background = '#1a4a6b';
  topbar.querySelector('.title').textContent = '📋 답안 확인 모드 — 선지를 클릭하면 해설이 펼쳐집니다';
  document.getElementById('progressText').textContent =
    `${correct} / ${questions.length} 정답 · ${earned}점`;

  // 1번 문항으로 이동
  currentIdx = 0;
  renderQuestion(currentIdx);
});

/* ─── 결과 다운로드 ─── */

document.getElementById('downloadBtn').addEventListener('click', () => {
  const studentName = prompt('이름을 입력하세요 (파일명에 사용됩니다):', '') || '학생';
  const totalMs = submittedAt ? (submittedAt.getTime() - startTime) : 0;

  const passageDetail = {};
  passages.forEach(p => {
    passageDetail[p.id] = {
      지문범위: p.range,
      소요시간_분: Math.round((passageElapsed[p.id] || 0) / 60000 * 10) / 10
    };
  });

  let correct = 0;
  const detail = questions.map(q => {
    const userAns  = userAnswers[q.id] || null;
    const isCorrect = userAns === String(q.answer);
    if (isCorrect) correct++;
    const checked = checkLog[q.id] ? Array.from(checkLog[q.id]).sort() : [];
    return {
      문항번호: q.id,
      배점: q.points,
      유형: q.category || '',
      학생선택: userAns ? Number(userAns) : null,
      정답: q.answer,
      정오: isCorrect ? '정답' : '오답',
      확인한_해설_선지: checked.map(Number),
      확인한_해설_개수: checked.length,
      오답인데_정답해설만_확인: (!isCorrect && checked.length === 1 && Number(checked[0]) === q.answer)
    };
  });

  const result = {
    학생명: studentName,
    시험명: EXAM_NAME,
    제출시각: submittedAt ? submittedAt.toLocaleString('ko-KR') : null,
    총소요시간_분: Math.round(totalMs / 60000 * 10) / 10,
    지문별소요시간: passageDetail,
    총문항수: questions.length,
    맞은문항수: correct,
    문항별상세: detail
  };

  sendResultToNotion(result);

  const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const dateStr = submittedAt ? submittedAt.toISOString().slice(0, 10) : '';
  a.href     = url;
  a.download = `${studentName}_결과_${dateStr}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

/* ─── 초기화 ─── */

initPassageTimes();
renderQuestion(0);
updateProgress();

</script>
</body>
</html>
